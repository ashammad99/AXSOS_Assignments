<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Amadon Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body>
    <div class="container mt-5">
      <div class="row mb-4">
        <div class="col-md-12">
          <h1 class="display-4">🛒 Amadon Store</h1>
          <p class="lead text-muted">Welcome to our online store</p>
        </div>
      </div>

      <div class="row">
        <div class="col-md-12">
          <div class="table-responsive">
            <table class="table table-striped table-hover">
              <thead class="table-dark">
                <tr>
                  <th>Item</th>
                  <th>Price</th>
                  <th>Available Quantity</th>
                  <th>Quantity to Order</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                {% for product in all_products %}
                  <tr>
                    <form action="/checkout/" method="post">
                      {% csrf_token %}
                      <input type="hidden" name="product_id" value="{{ product.id }}" />
                      <td>
                        <strong>{{ product.description }}</strong>
                      </td>
                      <td>
                        <span class="badge bg-success">${{ product.price }}</span>
                      </td>
                      <td>{{ product.quantity }}</td>
                      <td>
                        <select name="quantity" class="form-select form-select-sm" style="max-width: 100px;">
                          <option value="1">1</option>
                          <option value="2">2</option>
                          <option value="3">3</option>
                          <option value="5">5</option>
                          <option value="10">10</option>
                        </select>
                      </td>
                      <td>
                        <button type="submit" class="btn btn-primary btn-sm">Buy Now</button>
                      </td>
                    </form>
                  </tr>
                {% endfor %}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
