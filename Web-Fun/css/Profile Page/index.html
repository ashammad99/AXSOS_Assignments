<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav>
        <div class="container">
            <h1 class="nav-title">Profile</h1>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#" class="active">My Profile</a></li>
                <li><a href="#">Find Connections</a></li>
                <li><button class="btn">Sign Out</button></li>
            </ul>
        </div>
    </nav>
    <div class="container main">
        <div class="left">

            <div class="user-card">
                <div class="card-head"></div>
                <div class="profile-icon"><img src="./assets/icons/user-circle.png" alt=""></div>
                <div class="user-info">
                    <h3>Ahmed Hammad</h3>
                    <p><img src="./assets/icons/map-marker.png" alt="Map Marker icon">Seattle</p>
                    <p>Developer | Engineer | Problem Solver <br>Master of shadows and Internet</p>
                    <p><img src="./assets/icons/gear.png" alt="edit profile icon"><a href="">edit profile</a></p>
                </div>
            </div>
            <div class="education">

                <div class="edu-head">
                    <p>Education</p>
                </div>
                <div class="edu-info">

                </div>
            </div>
        </div>
        <div class="right">
            <div class="connection-requests">
                <div class="request-head">
                    <p> <span class="no-of-requsts">2</span>Connection Requsts</p>
                </div>
            </div>
        </div>

</body>

</html>
